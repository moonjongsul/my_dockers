services:
  starVLA:
    container_name: starVLA
    #image: nvcr.io/nvidia/pytorch:25.03-py3
    image: moonjongsul/starvla-dgx-spark:nvcr.io-pytorch-25.03-py3
    stdin_open: true
    tty: true
    command: tail -f /dev/null
    ipc: host
    cap_add:
      - SYS_NICE
    ulimits:
      rtprio: 99
      rttime: -1
      memlock: -1
    network_mode: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    environment:
      - XAUTHORITY=/tmp/.docker.xauth
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - HF_HOME=/root/.cache/huggingface
      - PYTHONUNBUFFERED=1
      - TOKENIZERS_PARALLELISM=false
      # NCCL 멀티노드
      - MASTER_ADDR=192.168.200.12
      - MASTER_PORT=29500
      - NODE_RANK=0                   # 노드 1
      - NNODES=2                      # 노드 개수
      - NCCL_SOCKET_IFNAME=enp1s0f1np1
      - NCCL_IB_DISABLE=0
      - NCCL_NET_GDR_LEVEL=5
      - NCCL_DEBUG=WARN
      - UCX_NET_DEVICES=enp1s0f1np1
      - OMPI_MCA_btl_tcp_if_include=enp1s0f1np1
      - CUDA_HOME=/usr/local/cuda
    volumes:
      - /mnt/synology/RobotData:/mnt/synology
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
      - ${HOME}/.cache/huggingface:/root/.cache/huggingface:rw
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
      - /dev/shm:/dev/shm
      - ${HOME}/.ssh:/root/.ssh:ro
      - ${HOME}/.gitconfig:/root/.gitconfig:ro